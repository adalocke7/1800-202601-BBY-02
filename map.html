<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="Stylesheet" href="./Map/map.css">
    <script type="module" src="./src/components/site-navbar.js"></script>
    <title>VanGoal</title>
</head>
<body>

    <div class="navbar item-c">
    <site-navbar></site-navbar>
    </div>

    <div class="map-container item-a">
        <div class="text-center">
            <h1 class="display-5 fw-bold">Welcome to the stadium map!</h1>
            <div class="buttons">
                <p class="lead mb-4">This is a map of the stadium where you can navigate and find your way around.</p>
                <button id="Food">Food info</button>
                <button id="Drinks">Drinks info</button>
                <button id="KeyLocations">Key locations</button>
                <button id="Washrooms">Washroom info</button>
            </div>
            <div id="info"></div>
        </div>
    </div>

    <div class="map item-b">
        <img src="./images/bc-stadium-map.png">
    </div>

    <div class="gtranslate_wrapper"></div>
    <script>window.gtranslateSettings = {"default_language":"en","native_language_names":true,"detect_browser_language":true,"wrapper_selector":".gtranslate_wrapper","alt_flags":{"en":"canada"}}</script>
