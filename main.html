<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <title>VanGoal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Delius&family=Playwrite+NZ+Basic:wght@100..400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=keep" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">


    <link rel="icon" type="image/png" href="./images/football.png">

    <!-- Web Components for shared navbar and footer layout -->
    <script type="module" src="/src/components/site-navbar.js"></script>
</head>

<body id="main-page">
    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="images/main-back.mp4" type="video/mp4">
      </video>

    <!-- our own navbar goes here -->
     <site-navbar>
        <section class="hero-video">
            <video autoplay muted loop playsinline class="hero-bg">
              <source src="./images/Fifa-back.mp4" type="video/mp4">
            </video>
          
            <div class="hero-overlay"></div>
          
            <div class="hero-content">
              <h1>Upcoming Matches</h1>
              <p>Experience football like never before</p>
              <button class="hero-btn">Explore</button>
            </div>
          </section>
     </site-navbar>

    <!-- Main content goes here -->
     <div class="container-fluid bg-light text-dark p-5">
        <div class="container bg-light p-5">
            <h1 class="display-4">Welcome <span id="name-goes-here" class="notranslate">friend </span> </h1>
            <h4 class="quotes-go-here">Everyday quote: <span id="quotes"><b>quote: </b></span></h4>
        </div>
    </div>

    <div class="container-fluid bg-light text-dark p-5">
        <h1 id="card-title">Upcoming Matches</h1>
        <p class="subtitle">Let's unite around the world.</p>
        <button class="calendar-btn">Calendar →</button>
        <div id="matches-go-here" class="row justify-content-center">
        </div>
    </div>

    <template id="matchesCardTemplate">
    <!-- Changed p-1 to px-1 (horizontal only) and added g-2 to the parent row (see below) -->
    <div class="col-6 col-md-4 px-1 pb-2"> 
        <div class="card w-100">
            <img src="..." class="card-img-top" alt="...">
            <div class="card-body d-flex flex-column">
                <h5 class="title" style="text-align: center;"></h5>
                <p class="mb-1"><span class="group"></span></p>
                <p class="mb-1"><span class="date"></span></p>
                <p class="mb-1"><span class="time"></span></p>
                <p class="mb-1"><span class="location"></span></p>
                <div class="d-flex align-items-center justify-content-between mt-auto">
                    <button class="btn btn-primary remove-btn">Remove</button>
                    <span id="pin-btn" class="material-symbols-outlined">keep</span>
                </div>
            </div>
        </div>
    </div>
</template>
    <h2 style="color:white;"> Quiz History</h2>
    <div id="quiz-scores-go-here"></div>
  </section>


<div class="feedback-toggle">
    <button id="openFeedbackBtn" class="feedback-btn">
      Give Feedback
    </button>
  
    <div class="feedback-container hidden">
        <div class="container transparent-section">
            <h2 class="mb-4">Share Your Feedback</h2>
            <form id="feedbackForm">
                <div class="mb-3">
                    <label for="feedbackEmail" class="form-label">Email Address <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="feedbackEmail" required>
                    <small class="text-muted">We'll use this to follow up if needed</small>
                </div>

                <div class="mb-3">
                    <label for="feedbackSubject" class="form-label">Subject <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="feedbackSubject" placeholder="e.g., Feature Request, Bug Report" required>
                </div>

                <div class="mb-3">
                    <label for="feedbackRating" class="form-label">Rating <span class="text-danger">*</span></label>
                    <select class="form-select" id="feedbackRating" required>
                        <option value="">-- Select a rating --</option>
                        <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                        <option value="4">⭐⭐⭐⭐ Good</option>
                        <option value="3">⭐⭐⭐ Average</option>
                        <option value="2">⭐⭐ Poor</option>
                        <option value="1">⭐ Very Poor</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="feedbackText" class="form-label">Your Feedback <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="feedbackText" rows="5" placeholder="Tell us what you think..." required></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Submit Feedback</button>
                    <button type="reset" class="btn btn-secondary">Clear Form</button>
                </div>

                <div id="feedbackMessage" class="mt-3"></div>
                <button type="button" id="closeFeedback" class="btn btn-danger">Close</button>
            </form>
        </div>
    </div>

   <div class="gtranslate_wrapper"></div>
    <script>window.gtranslateSettings = {"default_language":"en","native_language_names":true,"detect_browser_language":true,"wrapper_selector":".gtranslate_wrapper","alt_flags":{"en":"canada"}}</script>
    <script src="https://cdn.gtranslate.net/widgets/latest/float.js" defer></script>

    <!---------------------------------------------->
    <!-- Your own JavaScript scripts go here      -->
    <!---------------------------------------------->

    <script type="module" src="/src/main.js"></script>

</body>

</html>
