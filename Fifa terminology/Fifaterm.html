<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIFA Terminology</title>
  <link rel="stylesheet" href="Fifaterm.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>FIFA Terminology</h1>
      <p>Search football terms stored in Firebase</p>
    </header>

    <section class="search-section">
      <input
        type="text"
        id="searchInput"
        placeholder="Search a term like offside, penalty, assist..."
      />
    </section>

    <section class="form-section">
      <h2>Add New Term</h2>
      <form id="termForm">
        <input type="text" id="termName" placeholder="Term name" required />
        <textarea id="termDefinition" placeholder="Definition" required></textarea>
        <button type="submit">Add Term</button>
      </form>
    </section>

    <section class="results-section">
      <h2>Terms</h2>
      <div id="termsList" class="terms-list"></div>
    </section>
  </div>

  <script type="module" src="fifaterm.js"></script>
</body>
</html>
