<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIFA Terminology</title>
    <link rel="stylesheet" href="Fifaterm.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>FIFA Terminology</h1>
            <p>Search football terms from Firebase Firestore</p>
        </header>

        <section class="search-box">
            <input
                type="text"
                id="searchInput"
                placeholder="Search terms like offside, penalty, free kick..."
            />
        </section>

        <section id="termsContainer" class="terms-container">
            <p class="loading">Loading terminology...</p>
        </section>
    </div>

    <script type="module" src="fifaterm.js"></script>
</body>
</html>
